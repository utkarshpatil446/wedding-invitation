<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #f8f0e3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    .envelope {
      position: relative;
      width: 80vw;
      max-width: 340px;
      height: 50vh;
      max-height: 260px;
      background: linear-gradient(145deg, #c94f4f, #a63c3c);
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* Envelope flap with gradient and shadow */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #d85c5c, #a63c3c);
      clip-path: polygon(0 0, 100% 0, 50% 50%);
      transform-origin: top center;
      transition: transform 2s ease;
      z-index: 2;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    /* Decorative golden border for richness */
    .envelope::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 3px solid #d4af37;
      border-radius: 8px;
      pointer-events: none;
    }

    /* Invitation card */
    .card {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 90%;
      height: 70%;
      background: #fff;
      border: 3px solid #d4af37;
      border-radius: 10px;
      text-align: center;
      padding: 15px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
      transition: transform 2s ease 1s;
      z-index: 1;
    }

    .card h1 {
      margin: 0;
      font-size: 1.2em;
      color: #333;
    }

    .card p {
      margin-top: 10px;
      font-size: 0.9em;
      color: #555;
    }

    /* Animation trigger */
    body.loaded .flap {
      transform: rotateX(-180deg);
    }

    body.loaded .card {
      transform: translateX(-50%) translateY(-20%);
    }
  </style>
</head>
<body>
  <div class="envelope">
    <div class="flap"></div>
    <div class="card">
      <h1>Patil & Pawar Families</h1>
      <p>Warmly invite you to the auspicious occasion of marriage</p>
    </div>
  </div>

  <script>
    window.onload = () => {
      document.body.classList.add('loaded');
    };
  </script>
</body>
</html>
